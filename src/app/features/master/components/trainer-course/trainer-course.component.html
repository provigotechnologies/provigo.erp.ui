<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<div class="card">
  <div class="page-header-wrapper">
    <label class="page-heading">Trainer Course Mapping</label>
  </div>

  <div class="card-body">
    <!-- Loading and message sections -->
    <div *ngIf="isLoading" class="loading-spinner">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
    <div *ngIf="errorMessage" class="error-message">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="success-message">
      <i class="fas fa-check-circle"></i> {{ successMessage }}
    </div>

    <!-- Branch Selection -->
    <div class="form-row">
      <div class="form-group">
        <label>
          <i class="fas fa-building"></i> Branch <span class="required">*</span>
        </label>
        <select 
          [(ngModel)]="selectedBranch" 
          (ngModelChange)="onBranchChange()"
          [class.error]="submitted && !selectedBranch">
          <option [ngValue]="null">-- Select Branch --</option>
          <option *ngFor="let branch of branches" [ngValue]="branch">
            {{ branch.branchName }}
          </option>
        </select>
        <div *ngIf="submitted && !selectedBranch" class="field-error">
          Branch is required
        </div>
      </div>
    </div>

    <!-- Course Selection (dependent on branch) -->
    <div class="form-row">
      <div class="form-group">
        <label>
          <i class="fas fa-book"></i> Course <span class="required">*</span>
        </label>
        <select 
          [(ngModel)]="selectedProduct" 
          (ngModelChange)="onProductChange()"
          [disabled]="!selectedBranch || products.length === 0"
          [class.error]="submitted && !selectedProduct">
          <option [ngValue]="null">
            {{ !selectedBranch ? '-- Select Branch First --' : products.length === 0 ? '-- No Courses Available --' : '-- Select Course --' }}
          </option>
          <option *ngFor="let product of products" [ngValue]="product">
            {{ product.productName }}
          </option>
        </select>
        <div *ngIf="selectedBranch && products.length === 0" class="info-message">
          <i class="fas fa-info-circle"></i> No courses available for this branch
        </div>
        <div *ngIf="submitted && !selectedProduct" class="field-error">
          Course is required
        </div>
      </div>
    </div>

    <!-- Trainer Selection (dependent on course) -->
    <div class="form-row">
      <div class="form-group">
        <label>
          <i class="fas fa-chalkboard-teacher"></i> Trainer <span class="required">*</span>
        </label>
        <select 
          [(ngModel)]="selectedTrainer"
          [disabled]="!selectedProduct || trainers.length === 0"
          [class.error]="submitted && !selectedTrainer">
          <option [ngValue]="null">
            {{ !selectedProduct ? '-- Select Course First --' : trainers.length === 0 ? '-- No Trainers Available --' : '-- Select Trainer --' }}
          </option>
          <option *ngFor="let trainer of trainers" [ngValue]="trainer">
            {{ trainer.firstName }} {{ trainer.lastName }}
          </option>
        </select>
        <div *ngIf="selectedProduct && trainers.length === 0" class="info-message">
          <i class="fas fa-info-circle"></i> No trainers available for this branch
        </div>
        <div *ngIf="submitted && !selectedTrainer" class="field-error">
          Trainer is required
        </div>
      </div>
    </div>

    <!-- Submit Button -->
    <div class="form-row button-row">
      <button type="button" (click)="submit()" [disabled]="isLoading" class="btn-submit">
        <i class="fas" [ngClass]="isLoading ? 'fa-spinner fa-spin' : 'fa-save'"></i>
        {{ isLoading ? 'Submitting...' : 'Submit Mapping' }}
      </button>
    </div>
</div>
