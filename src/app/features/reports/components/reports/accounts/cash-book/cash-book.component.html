<!-- HTML -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<div class="full-page-container">
  <div class="left-side">
    
    <!-- Row 1: Date + Buttons -->
    <div class="filter-row">
      <div class="date-group">
        <label>From</label>
        <input type="date" />
      </div>
      <div class="date-group">
        <label>Upto</label>
        <input type="date" />
      </div>
      <div class="filter-buttons">
        <button class="primary-btn">
          <span class="material-icons">search</span> Search
        </button>
        <button class="primary-btn reset">
          <span class="material-icons">refresh</span> Reset
        </button>
      </div>
      
    </div>    

    <!-- Row 2: Quick Filter Buttons -->
    <div class="quick-filters">
      <button class="quick-btn">Today</button>
      <button class="quick-btn">Yesterday</button>
      <button class="quick-btn">7 Days</button>
      <button class="quick-btn">30 Days</button>
    </div>

    <div class="serial-number-section">

    <!-- Table Container -->
    <div class="table-scroll">
      <table class="item-table">

          <tr>

      </table>
    </div>

    </div>
  </div>

  <!-- Right Side Space -->
  <div class="right-side">

</div>
