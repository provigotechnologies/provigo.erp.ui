<div class="customer-main-container">

  <!-- Heading -->
  <div class="page-header-wrapper">
    <label class="page-heading">Customer Management</label>
  </div>

  <div class="customer-container">

    <div class="customer-inner-container">

      <div class="customer-section">
        <fieldset class="form-box">
          <legend>Customer Information</legend>

          <!-- Full Name -->
          <div class="form-row">
            <label>Full Name <span class="required">*</span></label>
            <input
              type="text"
              name="fullName"
              [(ngModel)]="customerForm.fullName"
              required
              minlength="3"
              maxlength="100"
              #fullNameRef="ngModel"
            />
            <div *ngIf="fullNameRef.invalid && submitted" class="error-message">
              Full Name is required
            </div>
          </div>

          <!-- Phone -->
          <div class="form-row">
            <label>Phone <span class="required">*</span></label>
            <input
              type="text"
              name="phone"
              [(ngModel)]="customerForm.phone"
              maxlength="10"
              pattern="^[0-9]{10}$"
              inputmode="numeric"
              required
              #phoneRef="ngModel"
            />
            <div *ngIf="phoneRef.invalid && submitted" class="error-message">
              Valid 10-digit phone number required
            </div>
          </div>

          <!-- Email -->
          <div class="form-row">
            <label>Email</label>
            <input
              type="email"
              name="email"
              [(ngModel)]="customerForm.email"
              maxlength="250"
              #emailRef="ngModel"
            />
          </div>

          <!-- Address -->
          <div class="form-row">
            <label>Address</label>
            <textarea
              rows="3"
              maxlength="500"
              [(ngModel)]="customerForm.address"
              name="address">
            </textarea>
          </div>

          <!-- Join Date -->
          <div class="form-row">
            <label>Join Date</label>
            <input
              type="date"
              name="joinDate"
              [(ngModel)]="customerForm.joinDate"
            />
          </div>

          <!-- Status -->
          <div class="form-row">
            <label>Status</label>
            <div class="radio-options">
              <label>
                <input
                  type="radio"
                  name="isActive"
                  [value]="true"
                  [(ngModel)]="customerForm.isActive"
                />
                Active
              </label>

              <label>
                <input
                  type="radio"
                  name="isActive"
                  [value]="false"
                  [(ngModel)]="customerForm.isActive"
                />
                Inactive
              </label>
            </div>
          </div>
        </fieldset>
      </div>

      <!-- Save Buttons -->
      <div class="right-buttons">
        <button class="primary-btn" (click)="save()">
          <i class="material-icons">save</i> Save
        </button>

        <button class="primary-btn" (click)="saveAndNew()">
          <i class="material-icons">save</i> Save & New
        </button>
      </div>

    </div>

  </div>
</div>
