<div class="bank-form">

  <!-- <button class="close-button">✖</button> -->
  <div class="page-header-wrapper">
    <label class="page-heading">Add New Bank</label>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="accountName">Account Name <span class="required">*</span></label>
      <input type="text" id="accountName" name="accountName" />
    </div>

    <div class="form-group">
      <label for="bankName">Bank Name <span class="required">*</span></label>
      <input type="text" id="bankName" name="bankName" />
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="accountNo">Account No <span class="required">*</span></label>
      <input type="text" id="accountNo" name="accountNo" />
    </div>

    <div class="form-group radio-group">
      <label class="radio-label">Type</label>
      <div class="radio-options">
        <label><input type="radio" name="billTo" checked /> Credit (+)</label>
        <label><input type="radio" name="billTo" /> Debit (-)</label>
      </div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="openingBalance">Opening Balance</label>
      <input type="text" id="openingBalance" name="openingBalance" />
    </div>
  </div>

  <!-- Buttons -->
  <div class="button-group">
    <button class="primary-btn btn-add" type="button" (click)="addTable()">Add</button>
    <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
  </div>

  <div class="table-wrapper">
    <table class="bank-table">
      <thead>
        <tr>

          <th>Bank Name</th>

          <th>Type</th>
          <th>Actions</th>
        </tr>
      </thead>
