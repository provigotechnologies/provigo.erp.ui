<div class="bank-form">

    <div class="page-header-wrapper">
      <label class="page-heading">Add New Warehouse</label>
    </div>
      <!-- Table Name Input -->
      <label for="warehouseName">
        <span>Warehouse Name <span class="required">*</span></span>
      </label>
      <input type="text" id="warehouseName" name="warehouseName" [(ngModel)]="warehouseName" (input)="error = ''" />
    
      <label for="location">
        <span>Location <span class="required">*</span></span>
      </label>
      <input type="text" id="location" name="location"/>
    
      <!-- Error Message -->
      <div *ngIf="error" class="error-message">{{ error }}</div>
    
       <!-- Buttons -->
       <div class="button-group">
        <button class="primary-btn btn-add" type="button" (click)="addTable()">Add</button>
        <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
      </div>
    
       <!-- 🔽 Added Table Section -->
       <div class="table-wrapper">
          <table class="bank-table">
            <thead>
              <tr>
                <th>S.No</th>
                <th>Warehouse Name</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td></td>
                <td>
                  <button>✏️</button>
                  <button>🗑️</button>
                </td>
              </tr>
              <tr>
                <td>2</td>
                <td></td>
                <td>
                  <button>✏️</button>
                  <button>🗑️</button>
                </td>
              </tr>
              <tr>
                <td>3</td>
                <td></td>
                <td>
                  <button>✏️</button>
                  <button>🗑️</button>
                </td>
              </tr>
              <!-- More rows will go here -->
            </tbody>
          </table>
        </div>
    </div>
