<form #tableForm="ngForm" (ngSubmit)="addTable()" novalidate class="bank-form">

  <div class="page-header-wrapper">
    <label class="page-heading">Add New Table</label>
  </div>

 <!-- Brand Name Input -->
 <label for="tableName">
  Table Name <span class="required">*</span>
</label>
<input
  type="text"
  id="tableName"
  name="tableName"
  required
  minlength="4"
  pattern="^[a-zA-Z\s]+$"
  [(ngModel)]="tableName"
  #tableNameRef="ngModel"
  (input)="filterAlphabets(); error = ''"
/>

<!-- Validation Messages -->
<div *ngIf="(tableNameRef.invalid && submitted)" class="error-message">
  <div *ngIf="tableNameRef.errors?.['required']">Table name is required.</div>
  <div *ngIf="tableNameRef.errors?.['minlength']">Must be at least 4 characters.</div>
  <div *ngIf="tableNameRef.errors?.['pattern']">Only letters and spaces allowed.</div>
</div>

<div *ngIf="error && !tableNameRef.errors" class="error-message">{{ error }}</div>
  

  <!-- Buttons -->
  <div class="button-group">

    <button class="primary-btn btn-add" type="submit">
      {{ isEditMode ? 'Update' : 'Add' }}
    </button>
     <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
  </div>

  <!-- Table Section -->
  <div class="table-wrapper">
    <table class="bank-table">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Table Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Show 3 empty rows if list is empty -->
        <ng-container *ngIf="tableList.length === 0">
          <tr>
            <td colspan="3" style="text-align:center; color: gray;">No Table added yet.</td>
          </tr>
        </ng-container>

        <!-- Show data rows -->
        <tr *ngFor="let name of tableList; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ name }}</td>
          <td>
            <button type="button" (click)="editTable(i)">✏️</button>
            <button type="button" (click)="deleteTable(i)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</form>
