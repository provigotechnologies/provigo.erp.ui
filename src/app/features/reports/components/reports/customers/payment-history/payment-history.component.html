<!-- HTML -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<div class="full-page-container">

  <div class="page-header-wrapper">
    <label class="page-heading">Customers Payment History</label>
  </div>

  <div class="content-body">

  <div class="left-side">
    
    <div class="filter-row">

        <!-- Row 1 -->
        <div class="row">
          <div class="date-group">
            <label>Customer Name</label>
            <input type="text" />
          </div>
          <div class="date-group">
            <label>Contact No</label>
            <input type="text" />
          </div>
          <div class="date-group">
            <label>Narration/Remarks</label>
            <input type="text" />
          </div>
        </div>
      
        <!-- Row 2 -->
        <div class="row">
          <div class="date-group">
            <label>Payment Mode</label>
            <select>
              <option>Cash</option>
              <option>Card</option>
              <option>Bank</option>
            </select>
          </div>
          <div class="date-group">
            <label>From</label>
            <input type="date" />
          </div>
          <div class="date-group">
            <label>Upto</label>
            <input type="date" />
          </div>
        </div>
      
<!-- Row: Quick Filters Left + Search/Reset Right -->
<div class="row quick-filter-row">
    <div class="left-buttons">
      <button class="quick-btn">Today</button>
      <button class="quick-btn">Yesterday</button>
      <button class="quick-btn">7 Days</button>
      <button class="quick-btn">30 Days</button>
    </div>
    <div class="right-buttons">
      <button class="primary-btn">
        <span class="material-icons">search</span> Search
      </button>
      <button class="primary-btn reset">
        <span class="material-icons">refresh</span> Reset
      </button>
    </div>
  </div>
      
 </div>
      

    <div class="serial-number-section">

    <div class="table-scroll">

        <thead>
          <tr>
            <th>Date</th>
            <th>Receipt No</th>
            <th>Customer Name</th>
            <th>Contact No</th>
            <th>Amount</th>
            <th>Pay Mode</th>
            <th>Payment Ref.</th>
            <th>Linked To</th>

        <tbody>

    </div>
  </div>

  <!-- Right Side Space -->
  <div class="right-side">
    
    <div class="right-header">
      <label for="myInput"></label>
      <input type="text" id="myInput" />
    </div>  

<div class="action-buttons">
  <label>Received in cash:</label>
  <label>Received through bank:</label>
  <label>Received through others:</label>
</div>

<div class="tab-container">
  <div class="tab active">CATEGORYWISE</div>
  <div class="tab">MONTHWISE</div>
</div>

<div class="bar-chart">
  <div class="bar">
    <div class="bar-label">Supplier Refunds : ₹ 00</div>
    <div class="bar-fill"></div>
  </div>
  <div class="bar">
    <div class="bar-label">Supplier Payments : ₹ 00</div>
    <div class="bar-fill" ></div>
  </div>
  <div class="bar">
    <div class="bar-label">Sale Returns : ₹ 00</div>
    <div class="bar-fill" ></div>
  </div>
</div>

<div class="quick-info">
  <div class="quick-title">
    <span class="material-icons">wb_sunny</span> Quick Info
  </div>
  <div>Cash Inflow : ₹ 00</div>
  <div>Cash Outflow : ₹ 00</div>
  <div class="net-cash">Net Cash Flow : ₹ 00</div>
</div>

<div class="footer-buttons">
  <button class="icon-btn"><span class="material-icons">grid_on</span></button>
  <button class="icon-btn"><span class="material-icons">picture_as_pdf</span></button>
