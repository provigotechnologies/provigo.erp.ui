<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<!-- Page Header -->
<div class="page-header">
  <h2>Search and Manage Taxes</h2>
</div>

<!-- Delete Confirmation -->
<div *ngIf="showConfirmDelete" class="custom-alert">
  <div class="confirm-icon-text">
    <i class="fas fa-question-circle confirm-icon"></i>
    <span>Do you want to delete this tax?</span>
  </div>
  <div class="button-group">
    <button class="yes" (click)="confirmDelete()">Yes</button>
    <button class="no" (click)="cancelDelete()">No</button>
  </div>
</div>

<!-- Success / Error -->
<div *ngIf="successMessage" class="success-banner">
  <i class="fas fa-check-circle"></i> {{ successMessage }}
</div>

<div *ngIf="errorMessage" class="error-banner">
  <i class="fas fa-times-circle"></i> {{ errorMessage }}
</div>

<!-- Search + Add -->
<div class="top-bar">
  <div class="search-box">
    <input
      type="text"
      placeholder="Search by tax name..."
      [(ngModel)]="searchTerm"
      (input)="applySearch()"
    />
    <button class="search-btn">
      🔍
    </button>
  </div>

  <button class="add-btn">
    + Add New Tax
  </button>
</div>

<!-- Loading -->
<div *ngIf="isLoading" class="loading-text">
  Loading taxes...
</div>

<!-- Table -->
<div class="table-card">
  <table class="data-table">
    <thead>
      <tr>
        <th>S.No</th>
        <th>Name</th>
        <th>Rate (%)</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngIf="filteredList.length === 0 && !isLoading">
        <td colspan="5" class="no-data">No taxes found</td>
      </tr>

      <tr *ngFor="let item of filteredList; let i = index">
        <td>{{ i + 1 }}</td>
        <td class="bold">{{ item.name }}</td>
        <td>{{ item.rate | number:'1.2-2' }}%</td>
        <td>
          <span class="status active" *ngIf="item.isActive">Active</span>
          <span class="status inactive" *ngIf="!item.isActive">Inactive</span>
        </td>
        <td class="actions">
          <button class="icon-btn edit" (click)="editTax(item)"><i class="fas fa-pen"></i></button>
          <button class="icon-btn delete" (click)="deleteTax(item.taxId)"><i class="fas fa-trash"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
