<!-- app.component.html -->
<div class="app-container">
  <div class="main-content">

    <!-- Invoice Info -->
    <form class="invoice-form">
      <div class="section-container">

       <!-- Row 1 -->
        <div class="form-row">
        <label>
          <span>Invoice No <span class="required">*</span></span>
          <input type="text" />
        </label>
      
        <label>
          Invoice Date
          <input type="date" />
        </label>

        <label>
          Invoice Type
          <select>
            <option>GST</option>
            <option>Non-GST</option>
          </select>
        </label>
  
        <label>
          <span>Place of Supply <span class="required">*</span></span>
          <select>
            <option>Tamil Nadu</option>
            <option>Kerala</option>
          </select>
        </label>  

        <label>
          Due Date
          <input type="date" />
        </label>
        </div>

        <!-- Row 2 -->
        <div class="form-row">
        <div class="radio-group">
          <label class="radio-label">Bill To</label>
          <div class="radio-options">
            <label><input type="radio" name="billTo" checked /> Cash A/c</label>
            <label><input type="radio" name="billTo" /> Customer A/c</label>
          </div>
        </div>

        <label>
          <span>Customer <span class="required">*</span></span>
          <input type="text" value="CASH" />
        </label>
        
        <label>
          Contact No 
          <input type="text" />
        </label>

        <label>
          Address
          <input type="text" />
        </label>

        <label>
          Customer GSTIN
          <input type="text" />
        </label>
        </div>
      </div>

      <div class="section-container">

        <!-- Particulars Section -->
        <div class="section particulars-section">

           <!-- 🔹 Row 1: Horizontal Input Fields -->
            <div class="input-row">
              <label>Serial No.
                <input type="text" style="background-color: #fefeb5;" />
              </label>
              <label class="stacked-label">
                <span>Item Name<span class="required">*</span></span>
                <input type="text" />
              </label>
              <label class="stacked-label">
                <span>Unit<span class="required">*</span></span>
                <select><option>PCS</option><option>KG</option></select>
              </label>
              <label class="stacked-label">
                <span>Quantity<span class="required">*</span></span>
                <input type="text" />
              </label>
              <label class="stacked-label">
                <span>Sale Price<span class="required">*</span></span>
               <div class="rupee-wrapper">
                 <input type="text" />
                </div>
              </label>
              <label>M.R.P.
                <div class="rupee-wrapper">
                  <input type="text" />
                </div>
              </label>
              <label>Disc (%)
                <div class="rupee-wrapper">
                  <input type="text" />
                </div>
              </label>
              <label>Tax%
                <select></select>
              </label>
              <label>Cess%
                <select></select>
              </label>
              <label>Amount
                <div class="rupee-wrapper">
                  <input type="text" />
                </div>
              </label>
            </div>

          <!-- 🔹 Row 2: Item Tag + Add -->
          <div class="item-tags">

            <div class="radio-group">
              <div class="radio-options">
                <label><input type="radio" name="tag" checked />Item Tag</label>
                <label><input type="radio" name="tag" />Item Code</label>
              </div>
            </div>

            <div class="item-fields">
              <input id="desc" type="text" class="desc-input" placeholder="Item Description" />
              <input id="serial" type="text" placeholder="Serial No." />
              <button type="button" class="primary-btn">
                <i class="material-icons">add</i> Add
              </button>
            </div>
            
          </div>    

          <div class="table-container">
            <table class="item-table">
              <thead>
                <tr>
                  <th>S.No</th>
                  <th>Item Name</th>
                  <th>Tag</th>
                  <th>Quantity</th>
                  <th>Unit</th>
                  <th>Unit Price</th>
                  <th>Disc (%)</th>
                  <th>Tax (%)</th>
                  <th>Cess (%)</th>
                  <th>Net Price</th>
                  <th>Amount Before Tax</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of itemList; let i = index">
                  <td>{{i + 1}}</td>
                  <td>{{item.itemName}}</td>
                  <td>{{item.tag}}</td>
                  <td>{{item.qty}}</td>
                  <td>{{item.unit}}</td>
                  <td>{{item.unitPrice}}</td>
                  <td>{{item.discount}}</td>
                  <td>{{item.tax}}</td>
                  <td>{{item.cess}}</td>
                  <td>{{item.netPrice}}</td>
                  <td>{{item.amtBeforeTax}}</td>
                  <td>
                    <button (click)="editItem(i)">✏️</button>
                    <button (click)="removeItem(i)">🗑️</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>

      </div>

    </form>
  </div>
</div>
