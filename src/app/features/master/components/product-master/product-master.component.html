<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<form #productForm="ngForm" (ngSubmit)="addTable()" novalidate class="group-form">

  <!-- Validation Alert -->
  <div *ngIf="showConfirm" class="custom-warning">
    <div class="custom-warning-box">
      <div class="error-message-row">
        <i class="fas fa-exclamation-triangle warning-icon"></i>
        <span>{{ error }}</span>
      </div>
      <button type="button" (click)="showConfirm = false">Ok</button>
    </div>
  </div>

  <!-- Page Header -->
  <div class="page-header-wrapper">
    <label class="page-heading">{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</label>
  </div>

  <!-- Success / Error Banners -->
  <div *ngIf="successMessage" class="success-banner">
    <i class="fas fa-check-circle"></i> {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="error-banner">
    <i class="fas fa-times-circle"></i> {{ errorMessage }}
  </div>

  <!-- Row 1: Product Name + Status -->
  <div class="form-row">
    <div class="form-group">
      <label for="productName">Product Name <span class="required">*</span></label>
      <div class="input-wrapper">
        <input
          type="text"
          id="productName"
          name="productName"
          required
          minlength="2"
          maxlength="100"
          [(ngModel)]="productName"
          #productNameRef="ngModel"
          (input)="error = ''"
          placeholder="Enter product name"
        />
        <div *ngIf="productNameRef.invalid && submitted" class="error-message">
          <div *ngIf="productNameRef.errors?.['required']">Product name is required.</div>
          <div *ngIf="productNameRef.errors?.['minlength']">Minimum 2 characters required.</div>
        </div>
      </div>
    </div>

    <div class="form-group radio-group">
      <label class="radio-label">Status</label>
      <div class="radio-options">
        <label>
          <input type="radio" name="isActive" [value]="true" [(ngModel)]="isActive" /> Active
        </label>
        <label>
          <input type="radio" name="isActive" [value]="false" [(ngModel)]="isActive" /> Inactive
        </label>
      </div>
    </div>
  </div>

  <!-- Row 1: Branch -->
  <div class="form-row">
    <div class="form-group">
      <label for="branchId">Branch <span class="required">*</span></label>
      <div class="input-wrapper">
        <select
          id="branchId"
          name="branchId"
          required
          [(ngModel)]="branchId"
          #branchIdRef="ngModel"
          (change)="error = ''"
        >
          <option value="" disabled>Select Branch</option>
          <option *ngFor="let b of branches" [value]="b.branchId">
            {{ b.branchName }}
          </option>
        </select>
        <div *ngIf="branchIdRef.invalid && submitted" class="error-message">
          <div *ngIf="branchIdRef.errors?.['required']">Branch is required.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Row 2: Total Fee -->
  <div class="form-row">
    <div class="form-group">
      <label for="totalFee">Total Fee <span class="required">*</span></label>
      <div class="input-wrapper">
        <input
          type="number"
          id="totalFee"
          name="totalFee"
          required
          min="0"
          step="0.01"
          [(ngModel)]="totalFee"
          #totalFeeRef="ngModel"
          placeholder="Enter total fee"
        />
        <div *ngIf="totalFeeRef.invalid && submitted" class="error-message">
          <div *ngIf="totalFeeRef.errors?.['required']">Total fee is required.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="button-group">
    <button class="primary-btn btn-add" type="submit">
      {{ isEditMode ? 'Update' : 'Add' }}
    </button>
    <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
  </div>

</form>
