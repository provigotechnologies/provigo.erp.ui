<form #unitForm="ngForm" class="bank-form" (ngSubmit)="addTable()" novalidate>

  <!-- Page Header -->
  <div class="page-header-wrapper">
    <label class="page-heading">Add New Unit</label>
  </div>

  <!-- Unit Name Input -->
  <label for="unitName">
    <span>Unit Name <span class="required">*</span></span>
  </label>
  <input
    type="text"
    id="unitName"
    name="unitName"
    required
    minlength="2"
    pattern="^[a-zA-Z0-9\s]+$"
    [(ngModel)]="unitName"
    #unitNameRef="ngModel"
    (input)="error = ''"
/>

  <!-- Error Messages -->
  <div *ngIf="unitNameRef.invalid && (unitNameRef.touched || error)" class="error-message">
    <div *ngIf="unitNameRef.errors?.['required']">Unit name is required.</div>
    <div *ngIf="unitNameRef.errors?.['minlength']">Must be at least 2 characters.</div>
    <div *ngIf="unitNameRef.errors?.['pattern']">Only letters, numbers, and spaces allowed.</div>
    <div *ngIf="error && !unitNameRef.errors">{{ error }}</div>
  </div>

  <!-- Buttons -->
  <div class="button-group">
    <button class="primary-btn btn-add" type="button" [disabled]="unitForm.invalid" (click)="addTable()">Add</button>
    <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
  </div>

  <!-- Added Unit Table -->
  <div class="table-wrapper">
    <table class="bank-table">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Unit Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>

        <!-- Placeholder rows if list is empty -->
        <ng-container *ngIf="unitList.length === 0">
          <tr *ngFor="let i of [1, 2, 3]">
            <td>{{ i }}</td>
            <td style="color: gray;">-</td>
            <td>
              <button disabled>✏️</button>
              <button disabled>🗑️</button>
            </td>
          </tr>
        </ng-container>

        <!-- Dynamic rows -->
        <tr *ngFor="let name of unitList; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ name }}</td>
          <td>
            <button type="button" (click)="editTable(i)">✏️</button>
            <button type="button" (click)="deleteTable(i)">🗑️</button>
          </td>
        </tr>

      </tbody>
    </table>
  </div>
</form>
