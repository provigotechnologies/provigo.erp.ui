<div class="dialog-header">
  <h2 class="dialog-title">Update User</h2>
  <button class="close-btn" (click)="onCancel()">×</button>
</div>

<div class="dialog-body">
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">

    <!-- Row 1: First Name & Last Name -->
    <div class="form-row">
      <div class="form-group">
        <label>First Name <span>*</span></label>
        <input type="text" formControlName="firstname" />
        <div class="error" *ngIf="userForm.get('firstname')?.invalid && userForm.get('firstname')?.touched">
          First Name is required
        </div>
      </div>

      <div class="form-group">
        <label>Last Name </label>
        <input type="text" formControlName="lastname" />
        <div class="error">
        </div>
      </div>
    </div>

    <!-- Row 2: Email & Password -->
    <div class="form-row">
      <div class="form-group">
        <label>Email <span>*</span></label>
        <input type="email" formControlName="email" />
        <div class="error" *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched">
         Email is required
        </div>
      </div>

      <div class="form-group">
        <label>Password <span>*</span></label>
        <input type="password" formControlName="password" />
        <div class="error" *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched">
          Password is required
        </div>
      </div>
    </div>

    <!-- Row 3: Phone & Role -->
    <div class="form-row">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" formControlName="phonenumber" />
      </div>

      <div class="form-group">
       <label for="role">Role <span>*</span></label>
       <select id="role" formControlName="role">
         <option value="">Select</option>
         <option value="Admin">Admin</option>
         <option value="Manager">Manager</option>
         <option value="User">User</option>
        <!-- Add more roles if needed -->
       </select>
        <div class="error" *ngIf="userForm.get('role')?.invalid && userForm.get('role')?.touched">
          Role is required
        </div>
      </div>

    </div>

   <div class="form-row">
      <div class="form-group full-width">
         <label class="inline-label">Active <span>*</span></label>
        <div class="inline-radio-group">
          <label class="radio-option">Yes <input type="radio" formControlName="isActive" [value]="true" /></label>
          <label class="radio-option">No <input type="radio" formControlName="isActive" [value]="false" /></label>
        </div>
      </div>
    </div>

    <!-- ✅ Place submit buttons inside the <form> -->
    <div class="dialog-actions">
      <button type="button" (click)="onCancel()">Cancel</button>
      <button type="submit" [disabled]="!userForm.valid">Update</button>
    </div>
  </form>
</div>
