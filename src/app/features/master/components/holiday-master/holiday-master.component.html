<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<form #bankForm="ngForm" (ngSubmit)="addTable()" novalidate class="bank-form">

<!-- Custom Confirmation Alert Box -->
<div *ngIf="showConfirmDelete" class="custom-alert">
  <div class="confirm-icon-text">
   <i class="fas fa-question-circle confirm-icon"></i>
    <span>Do you want to delete this data?</span>
  </div>
  <div class="button-group">
    <button class="yes" (click)="confirmDelete()">Yes</button>
    <button class="no" (click)="cancelDelete()">No</button>
  </div>
</div>

  <div class="page-header-wrapper">
    <label class="page-heading">Add New Holiday</label>
  </div>

 <!-- Brand Name Input -->
 <label for="holidayName">
  Holiday Name <span class="required">*</span>
</label>
<input
  type="text"
  id="holidayName"
  name="holidayName"
  required
  minlength="4"
  maxlength="50"
  pattern="^[a-zA-Z\s]+$"
  [(ngModel)]="holidayName"
  #holidayNameRef="ngModel"
  (input)="filterAlphabets(); error = ''"
/>

<!-- Validation Messages -->
<div *ngIf="(holidayNameRef.invalid && submitted)" class="error-message">
  <div *ngIf="holidayNameRef.errors?.['required']">Holiday name is required.</div>
  <div *ngIf="holidayNameRef.errors?.['pattern']">Only letters and spaces allowed.</div>
</div>

<div *ngIf="error && !holidayNameRef.errors" class="error-message">{{ error }}</div>
  
  <!-- Buttons -->
  <div class="button-group">

    <button class="primary-btn btn-add" type="submit">
      {{ isEditMode ? 'Update' : 'Add' }}
    </button>
     <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
  </div>

  <!-- Table Section -->
  <div class="table-wrapper">
    <table class="bank-table">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Holiday Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Show 3 empty rows if list is empty -->
        <ng-container *ngIf="holidayList.length === 0">
          <tr>
            <td colspan="3" style="text-align:center; color: gray;">No holiday added yet.</td>
          </tr>
        </ng-container>

        <!-- Show data rows -->
        <tr *ngFor="let name of holidayList; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ name }}</td>
          <td>
            <button type="button" (click)="editTable(i)">✏️</button>
            <button type="button" (click)="deleteTable(i)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</form>
