
<div class="bank-form">

  <div class="page-header-wrapper">
    <label class="page-heading">Add New Designation</label>
  </div>
    <!-- Table Name Input -->
    <label for="designationName">
      <span>Designation Name <span class="required">*</span></span>
    </label>
    <input type="text" id="designationName" name="designationName" [(ngModel)]="designationName" (input)="error = ''" />
  
    <!-- Error Message -->
    <div *ngIf="error" class="error-message">{{ error }}</div>
  
     <!-- Buttons -->
     <div class="button-group">
      <button class="primary-btn btn-add" type="button" (click)="addTable()">Add</button>
      <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
    </div>
  
     <!-- 🔽 Added Table Section -->
     <div class="table-wrapper">
        <table class="bank-table">
          <thead>
            <tr>
              <th>S.No</th>
              <th>Designation Name</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td></td>
              <td>
                <button>✏️</button>
                <button>🗑️</button>
              </td>
            </tr>
            <tr>
              <td>2</td>
              <td></td>
              <td>
                <button>✏️</button>
                <button>🗑️</button>
              </td>
            </tr>
            <tr>
              <td>3</td>
              <td></td>
              <td>
                <button>✏️</button>
                <button>🗑️</button>
              </td>
            </tr>
            <!-- More rows will go here -->
          </tbody>
        </table>
      </div>
  </div>
