<!-- Main Layout Container -->
<div class="product-main-container">
    <!-- Left Side -->
    <div class="product-container">
      <!-- Left Container 1 -->
      <div class="product-inner-container">
        <!-- Category -->
        <div class="form-row">
          <label for="category">Group <span class="required">*</span></label>
          <select id="category">
            <option value="">Select Group</option>
            <option value="cat1">Cat 1</option>
            <option value="cat2">Cat 2</option>
          </select>
        </div>
  
        <!-- Brand -->
        <div class="form-row">
          <label for="brand">Brand <span class="required">*</span></label>
          <select id="brand">
            <option value="">Select Brand</option>
            <option value="brand1">Brand 1</option>
            <option value="brand2">Brand 2</option>
          </select>
        </div>
  
        <!-- Barcode -->
        <div class="form-row">
          <label for="itemcode">Item Code</label>
          <input type="text" id="itemcode" />
        </div>
  
        <!-- Product Name -->
        <div class="form-row">
          <label for="productName">Product Name <span class="required">*</span></label>
          <input type="text" id="productName" />
        </div>
  
        <!-- Price -->
        <div class="form-row">
          <label for="printname">Print Name</label>
          <input type="text" id="printname" />
        </div>
      </div>
  
      <!-- Left Container 2 -->
      <div class="product-inner-container">
        <!-- Purchase Price -->
        <div class="form-row">
            <label>Purchase Price <span class="required">*</span></label>
            <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
              <div class="rupee-wrapper">
                <span class="currency-symbol">₹</span>
                <input type="text" />
              </div>    
            </div>        
        </div>
  
        <!-- Sale Price -->
        <div class="form-row">
            <label>Sale Price <span class="required">*</span></label>
            <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
              <div class="rupee-wrapper">
                <span class="currency-symbol">₹</span>
                <input type="text" />
              </div>    
            </div>          
        </div>
  
        <!-- Min Sale Price -->
        <div class="form-row">
            <label>Min.Sale Price <span class="required">*</span></label>
            <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
              <div class="rupee-wrapper">
                <span class="currency-symbol">₹</span>
                <input type="text" />
              </div>    
            </div>         
        </div>
  
        <!-- MRP -->
        <div class="form-row">
            <label>M.R.P <span class="required">*</span></label>
            <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
              <div class="rupee-wrapper">
                <span class="currency-symbol">₹</span>
                <input type="text" />
              </div>    
            </div>
      </div>

    </div>
  
      <!-- Left Container 3 -->
      <div class="product-inner-container">
        <div class="form-row">
          <label for="unitselect">Unit  <span class="required">*</span></label>
          <select id="unitselect">
            <option value="">Select Unit</option>
            <option value="unit">Kg</option>
            <option value="unit">Box</option>
          </select>
        </div>
        <div class="form-row">
          <label for="stock">Opening Stock</label>
          <input type="text" id="stock" />
        </div>
        <div class="form-row">
          <label>Opening Stock Value</label>
          <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
            <div class="rupee-wrapper">
              <span class="currency-symbol">₹</span>
              <input type="text" />
            </div>    
          </div>        
      </div>
      </div>

    </div>
  
    <!-- Right Side -->
    <div class="product-container">
      <!-- Right Container 1 -->
      <div class="product-inner-container">
        <div class="form-row">
          <label>HSN/ SAC Code</label>
          <input type="text" />
        </div>
        <div class="form-row">
          <div class="gst-container">
            <label class="gst-label">GST Rates 
              <span class="required">*</span></label>
            <div class="gst-fields">
              <div class="gst-row">
                <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
                  <div class="rupee-wrapper">
                    <span class="currency-symbol">CGST</span>
                    <input type="text" />
                    <span class="currency-symbol">%</span>
                  </div>    
                </div>  
                <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
                  <div class="rupee-wrapper">
                    <span class="currency-symbol">Cess</span>
                    <input type="text" />
                    <span class="currency-symbol">%</span>
                  </div>    
                </div>  
                </div>
              <div class="gst-row">
                <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
                  <div class="rupee-wrapper">
                    <span class="currency-symbol">SGST</span>
                    <input type="text" />
                    <span class="currency-symbol">%</span>
                  </div>    
                </div>  
                <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
                  <div class="rupee-wrapper">
                    <span class="currency-symbol">IGST</span>
                    <input type="text" />
                    <span class="currency-symbol">%</span>
                  </div>    
                </div>  
                </div>
            </div>
          </div>
        </div>            
      </div>
  
      <!-- Right Container 2 -->
      <div class="product-inner-container">
        <div class="form-row">
          <label>Sale Discount </label>
          <div class="input-flex-wrapper"> <!-- NEW WRAPPER -->
            <div class="rupee-wrapper">
              <input type="text" />
              <span class="currency-symbol">%</span>
            </div>    
          </div>        
      </div>
        <div class="form-row">
          <label>Low Level Limit</label>
          <input type="text" />
        </div>
        <div class="form-row">
          <label for="unitselect">Product Type</label>
          <select id="unitselect">
            <option value="">Select Product Type</option>
            <option value="unit"></option>
            <option value="unit"></option>
          </select>
        </div>
        <div class="form-row">
          <label for="unitselect">Location/Rack</label>
          <select id="unitselect">
            <option value="">Select Location</option>
            <option value="unit"></option>
            <option value="unit"></option>
          </select>
        </div>
        <div class="form-row">
          <label>Serial No</label>
          <input type="text" />
        </div>
        <div class="form-row">
          <label>Product Description</label>
          <textarea rows="3"></textarea>
        </div>
     </div>

     <div class="product-inner-container">
      <!-- First Row - 3 Checkboxes -->
      <div class="form-row checkbox-row">
        <label><input type="checkbox" /> <span class="checkmark"></span> Print Description</label>
        <label><input type="checkbox" /> <span class="checkmark"></span> One Click Sale</label>
        <label><input type="checkbox" /> <span class="checkmark"></span> Enable Tracking</label>
      </div>
    
      <!-- Second Row - 2 Checkboxes -->
      <div class="form-row checkbox-row">
        <label><input type="checkbox" /> <span class="checkmark"></span> Print Serial No</label>
        <label style="color: red;"><input type="checkbox" /> <span class="checkmark"></span> Not For Sale</label>
      </div>
    </div>    

    <div class="right-buttons">
      <button class="primary-btn">
         <i class="material-icons">save</i> Save
      </button>
   </div>

  </div>

  </div>
