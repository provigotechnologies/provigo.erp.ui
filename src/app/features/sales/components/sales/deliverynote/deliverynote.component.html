<!-- app.component.html -->
<div class="app-container">
    <div class="main-content">
  
      <!-- Invoice Info -->
      <form class="invoice-form">
  
        <div class="section-container">
  
         <!-- Row 1 -->
          <div class="form-row">
        
            <label>
                Note Type
                <select>
                  <option>GST</option>
                  <option>Non-GST</option>
                  <option>Bill of Supply</option>
                </select>
              </label>

          <label>
             Date
            <input type="date" />
          </label>
    
          <label>
            Shipping Date
           <input type="date" />
         </label>

         <label>
            <span>Place of Supply <span class="required">*</span></span>
            <select>
              <option>Tamil Nadu</option>
              <option>Kerala</option>
            </select>
          </label> 

          </div>
  
          <!-- Row 2 -->
          <div class="form-row">
         
            <div class="radio-group">
                <label class="radio-label">Bill To</label>
                <div class="radio-options">
                  <label><input type="radio" name="billTo" checked /> Cash A/c</label>
                  <label><input type="radio" name="billTo" /> Customer A/c</label>
                </div>
              </div>
              
          <label>
            <span>Customer <span class="required">*</span></span>
            <input type="text" value="CASH" />
          </label>
          
          <label>
            Contact No 
            <input type="text" />
          </label>
  
          <label>
            Address
            <input type="text" />
          </label>

          <label>
            Customer GSTIN
            <input type="text" />
          </label>
          </div>
        </div>
  
        <div class="section-container">
  
          <!-- 🔹 Row 1: Horizontal Input Fields -->
              <div class="input-row">
                <label class="stacked-label">
                  <span>Serial No<span class="required">*</span></span>
                 <div class="rupee-wrapper"  style="display: flex; align-items: center;">
                  <input type="text" />
                  </div>
                </label>
  
                <label class="stacked-label" id="itemname">
                  <span>Item Name<span class="required">*</span></span>
                  <input type="text" />
                </label>
  
                <label class="stacked-label">
                  <span>Unit<span class="required">*</span></span>
                  <select><option>PCS</option><option>KG</option></select>
                </label>
  
                <label class="stacked-label">
                  <span>Quantity<span class="required">*</span></span>
                  <input type="text" />
                </label>
  
                <label class="stacked-label">
                  <span>Sale Price<span class="required">*</span></span>
                 <div class="rupee-wrapper"  style="display: flex; align-items: center;">
                  <span style="padding: 6px; background-color: #007bff; height: 13px; color: white;">₹</span>
                   <input type="text" />
                  </div>
                </label>
        
                <label class="stacked-label">
                  <span>M.R.P<span class="required">*</span></span>
                 <div class="rupee-wrapper"  style="display: flex; align-items: center;">
                  <span style="padding: 6px; background-color: #007bff; height: 13px; color: white;">₹</span>
                   <input type="text" />
                  </div>
                </label>
  
                <label class="stacked-label">
                  <span>Disc(%)<span class="required">*</span></span>
                 <div class="rupee-wrapper"  style="display: flex; align-items: center;">
                  <span style="padding: 6px; background-color: #007bff; height: 13px; color: white;">₹</span>
                   <input type="text" />
                  </div>
                </label>
  
                <label>Tax%
                  <select></select>
                </label>
  
                <label>Cess%
                  <select></select>
                </label>
  
                <label class="stacked-label">
                  <span>Amount<span class="required"></span></span>
                 <div class="rupee-wrapper"  style="display: flex; align-items: center;">
                  <span style="padding: 6px; background-color: #007bff; height: 13px; color: white;">₹</span>
                   <input type="text"  style="background-color: rgb(244, 241, 241);" readonly/>
                  </div>
                </label>
              </div>
  
            <!-- 🔹 Row 2: Item Tag + Add -->
            <div class="item-tags">
  
              <div class="radio-group">
                <div class="radio-options">
                  <label><input type="radio" name="tag" checked />Item Tag</label>
                  <label><input type="radio" name="tag" />Item Code</label>
                </div>
              </div>
  
              <div class="item-fields">
                <input id="desc" type="text" class="desc-input" placeholder="Item Description" />
                <button type="button" class="add-btn">
                  <i class="material-icons">add</i> Add
                </button>
              </div>
              
            </div>    
  
            <div class="table-container">
              <table class="item-table">
                <thead>
                  <tr>
                    <th>S.No</th>
                    <th>Item Name</th>
                    <th>Tag</th>
                    <th>Quantity</th>
                    <th>Unit</th>
                    <th>Unit Price</th>
                    <th>Disc (%)</th>
                    <th>Tax (%)</th>
                    <th>Cess (%)</th>
                    <th>Net Price</th>
                    <th>Amount Before Tax</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td>
                      <button>✏️</button>
                      <button>🗑️</button>
                    </td>
                  </tr>
                  <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td>
                      <button>✏️</button>
                      <button>🗑️</button>
                    </td>
                  </tr>
                  <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td>
                      <button>✏️</button>
                      <button>🗑️</button>
                    </td>
                  </tr>
                </tbody>
                
              </table>
            </div>
  
        </div>
       
        <div class="invoice-footer-grid">
          <div class="footer-columns">
  
          <div class="grid-container">
        
            <div class="label">
              <div class="checkbox-label">
                <input type="checkbox" checked style="color: #007bff;" />
                <span>Add'l discount</span>
              </div>
            </div>
            <div class="input-pair">
              <input type="text" placeholder="Discount%" />
              <span>or</span>
              <input type="text" placeholder="₹" />
            </div>
        
            <div class="label">
              <div class="checkbox-label">
                <input type="checkbox" checked />
                <span>Add reference</span>
              </div>
            </div>
            <div class="input-pair">
              <select><option>P.O. No.</option></select>
              <span></span><span></span> <span></span>
              <input type="text" placeholder="Document No." />
            </div>
        
            <div class="label">
              <div class="checkbox-label">
                <input type="checkbox" checked />
                <span>Add shipping</span>
              </div>
            </div>
            <div class="input-pair">
              <input type="text" placeholder="₹ Amount" />
              <span></span><span></span> <span></span>
              <select><option>Shipping Tax (%)</option></select>
            </div>   
          </div>
  
           <!-- WRAP these two in a flex row -->
           <div class="textarea-column">
            <div class="textarea-row">
              <div class="group textarea">
                <label>Delivery Terms</label>
                <textarea rows="4" cols="28"></textarea>
              </div>
              <div class="group textarea">
                <label>Remarks (Private Use)</label>
                <textarea rows="4" cols="28"></textarea>
              </div>
            </div>
          </div>        
          
  
          <div class="amount-summary">
            <div class="row">
              <span><strong>Sub Total</strong></span>
              <span class="value">₹ 0.00</span>
            </div>
            <div class="row">
              <span>Add CGST (0%)</span>
              <span class="value">₹ 0.00</span>
            </div>
            <div class="row">
              <span>Add SGST (0%)</span>
              <span class="value">₹ 0.00</span>
            </div>
            <div class="row total">
              <span><strong>Total Amount</strong></span>
              <span class="value"><strong>₹ 0.00</strong></span>
            </div>
          </div>        
          
          
          </div>
        </div>
        
        <!-- Bottom Sticky Actions Bar -->
        <div class="actions-bar">
          <!-- Left Icon Group -->
          <div class="left-icons">
             <button title="Reminder"><i class="material-icons">notifications</i></button>
             <button title="Calculator"><i class="material-icons">calculate</i></button>
          </div>
  
          <!-- Right Save Buttons -->
          <div class="right-buttons">
             <button class="primary-btn">
               <i class="material-icons">print</i> Save and Print
             </button>
             <button class="primary-btn">
                <i class="material-icons">save</i> Save
             </button>
          </div>
        </div>
  
      </form>
      
    </div>
  </div>
