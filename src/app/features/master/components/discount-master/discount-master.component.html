<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<form #discountForm="ngForm" (ngSubmit)="save()" novalidate class="group-form">

  <!-- Validation Alert -->
  <div *ngIf="showConfirm" class="custom-warning">
    <div class="custom-warning-box">
      <div class="error-message-row">
        <i class="fas fa-exclamation-triangle warning-icon"></i>
        <span>{{ error }}</span>
      </div>
      <button type="button" (click)="showConfirm = false">Ok</button>
    </div>
  </div>

  <!-- Page Header -->
  <div class="page-header-wrapper">
    <label class="page-heading">{{ isEditMode ? 'Edit Discount' : 'Add New Discount' }}</label>
  </div>

  <!-- Banners -->
  <div *ngIf="successMessage" class="success-banner">
    <i class="fas fa-check-circle"></i> {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="error-banner">
    <i class="fas fa-times-circle"></i> {{ errorMessage }}
  </div>

  <!-- Row 1: Name + Status -->
  <div class="form-row">
    <div class="form-group">
      <label for="discountName">Name <span class="required">*</span></label>
      <div class="input-wrapper">
        <input
          type="text" id="discountName" name="name" required minlength="2" maxlength="100"
          [(ngModel)]="name" #nameRef="ngModel" placeholder="Enter discount name"
        />
        <div *ngIf="nameRef.invalid && submitted" class="error-message">
          <div *ngIf="nameRef.errors?.['required']">Name is required.</div>
          <div *ngIf="nameRef.errors?.['minlength']">Minimum 2 characters required.</div>
        </div>
      </div>
    </div>

    <div class="form-group radio-group">
      <label class="radio-label">Status</label>
      <div class="radio-options">
        <label><input type="radio" name="isActive" [value]="true"  [(ngModel)]="isActive" /> Active</label>
        <label><input type="radio" name="isActive" [value]="false" [(ngModel)]="isActive" /> Inactive</label>
      </div>
    </div>
  </div>

  <!-- Row 2: Type + Value -->
  <div class="form-row">
    <div class="form-group">
      <label for="discountType">Discount Type <span class="required">*</span></label>
      <select id="discountType" name="type" [(ngModel)]="type">
        <option *ngFor="let opt of typeOptions" [value]="opt">{{ opt }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="discountValue">Value <span class="required">*</span></label>
      <div class="input-wrapper">
        <input
          type="number" id="discountValue" name="value" required min="0" step="0.01"
          [(ngModel)]="value" #valueRef="ngModel"
          [placeholder]="type === 'Percentage' ? 'Enter % value' : 'Enter flat amount'"
        />
        <div *ngIf="valueRef.invalid && submitted" class="error-message">
          <div *ngIf="valueRef.errors?.['required']">Value is required.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="button-group">
    <button class="primary-btn btn-add" type="submit">{{ isEditMode ? 'Update' : 'Add' }}</button>
    <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
  </div>

</form>
