<!-- HTML -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<div class="full-page-container">
  
  <div class="page-header-wrapper">
    <label class="page-heading">Invoicewise Sales Summary</label>
  </div>

  <div class="content-body">

  <div class="left-side">
    
    <div class="filter-row">
      
        <!-- Row 2 -->
        <div class="row">
            <div class="date-group">
                <label>From</label>
                <input type="date" />
              </div>
              <div class="date-group">
                <label>Upto</label>
                <input type="date" />
              </div>
          <div class="date-group">
            <label>Type</label>
            <select>
              <option>All</option>
              <option>GST</option>
              <option>Non GST</option>
              <option>Bill of Supply</option>
            </select>
          </div>
          <div class="date-group">
            <label>Keyword</label>
            <input type="text" />
          </div>
        </div>
      
        <!-- Quick filter row -->
        <div class="row quick-filter-row">
          <div class="left-buttons">
            <button class="quick-btn">Today</button>
            <button class="quick-btn">Yesterday</button>
            <button class="quick-btn">7 Days</button>
            <button class="quick-btn">30 Days</button>
          </div>
          <div class="right-buttons">
            <button class="primary-btn">
              <span class="material-icons">search</span> Search
            </button>
            <button class="primary-btn reset">
              <span class="material-icons">refresh</span> Reset
            </button>
          </div>
        </div>
      </div>
      
      

    <div class="serial-number-section">

    <!-- Table Container -->
    <div class="table-scroll">
      <table class="item-table">
        <thead>
          <tr>
            <th>Invoice No.</th>
            <th>Invoice Date</th>
            <th>Total Items</th>
            <th>Total Amount</th>
            <th>Discount Amount</th>
            <th>Tax Amount</th>
            <th>Grand Total</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td></td>
            <td></td>
            <td></td>    
            <td></td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
          <tr>
            <td></td>  
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>

    </div>

      <div class="bottom-left-container">
    <div class="footer-buttons">
      <button class="icon-btn"><span class="material-icons">grid_on</span></button>
      <button class="icon-btn"><span class="material-icons">picture_as_pdf</span></button>
      <button class="icon-btn"><span class="material-icons">email</span></button>
      <button class="icon-btn"><span class="material-icons">print</span></button>
    </div>
  </div>

  </div>
</div>
