
<div class="bank-form">

  <div class="page-header-wrapper">
    <label class="page-heading">Add New Brand</label>
  </div>
  <!-- Table Name Input -->
  <label for="brandName">
    <span>Brand Name <span class="required">*</span></span>
  </label>
  <input type="text" id="brandName" name="brandName" [(ngModel)]="brandName" (input)="error = ''" />

  <!-- Error Message -->
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <!-- Buttons -->
  <div class="button-group">
    <button type="button" (click)="addTable()">Add</button>
    <button type="button" (click)="cancel()">Cancel</button>
  </div>

   <!-- 🔽 Added Table Section -->
   <div class="table-wrapper">
      <table class="bank-table">
        <thead>
          <tr>
            <th>S.No</th>
            <th>Brand Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td></td>
            <td>
              <button>✏️</button>
              <button>🗑️</button>
            </td>
          </tr>
          <tr>
            <td>2</td>

            </td>
          </tr>
          <!-- More rows will go here -->
        </tbody>
      </table>
    </div>
</div>
