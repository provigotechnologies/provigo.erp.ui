<div class="bank-form">
  <!-- Table Name Input -->
  <label for="tableName">
    <span>Table Name <span class="required">*</span></span>
  </label>
  <input type="text" id="tableName" name="tableName" [(ngModel)]="tableName" (input)="error = ''" />

  <!-- Error Message -->
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <!-- Buttons -->
  <div class="button-group">
    <button type="button" (click)="addTable()">Add</button>
    <button type="button" (click)="cancel()">Cancel</button>
  </div>

   <!-- 🔽 Added Table Section -->
   <div class="table-wrapper">
      <table class="bank-table">
        <thead>
          <tr>
            <th>S.No</th>
            <th>Table Name</th>

          </tr>
        </thead>

              <button>✏️</button>
              <button>🗑️</button>
            </td>
          </tr>

            <td>2</td>

          </tr>
          <!-- More rows will go here -->

      </table>
    </div>
</div>
