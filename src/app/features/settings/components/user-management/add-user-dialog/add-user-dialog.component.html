
<div class="dialog-header">
  <h2 class="dialog-title">Add New User</h2>
  <button class="close-btn" (click)="onCancel()">×</button>
</div>

<div class="dialog-body">
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()">

    <!-- Row 1: First Name & Last Name -->
    <div class="form-row">
      <div class="form-group">
        <label>First Name <span>*</span></label>
        <input type="text" formControlName="firstname" (keypress)="allowOnlyLetters($event)" />
        <div class="error" *ngIf="userForm.get('firstname')?.invalid && (userForm.get('firstname')?.touched || submitted)">
          First Name is required and must contain only letters
        </div>
      </div>
      

      <div class="form-group">
        <label>Last Name </label>
        <input type="text" formControlName="lastname" (keypress)="allowOnlyLetters($event)"/>
        <div class="error">
        </div>
      </div>
    </div>

    <!-- Row 2: Email & Password -->
    <div class="form-row">
      <div class="form-group">
        <label>Email <span>*</span></label>
        <input type="email" formControlName="email" />
        <div class="error" *ngIf="userForm.get('email')?.invalid && (userForm.get('email')?.touched || submitted)">
          <span *ngIf="userForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="userForm.get('email')?.errors?.['email']">Invalid email format</span>
          <span *ngIf="userForm.get('email')?.errors?.['gmailOnly']">Email must end with &#64;gmail.com</span>
          <span *ngIf="userForm.get('email')?.errors?.['emailTaken']">Email already registered</span> 
        </div>
      </div>


      <div class="form-group">
        <label>Password <span>*</span></label>
        <input type="password" formControlName="password" />
        <div class="error" *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched">
          Password is required
        </div>
      </div>
    </div>

    <!-- Row 3: Phone & Role -->
    <div class="form-row">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" formControlName="phonenumber" (keypress)="allowOnlyNumbers($event)"/>
      </div>

      <div class="form-group">
       <label for="role">Role <span>*</span></label>
        <select id="role" formControlName="role">
        <option value="">Select</option>
        <option *ngFor="let r of roles" [value]="r.id">
          {{ r.roleName }}
         </option>
       </select>
        <div class="error" *ngIf="userForm.get('role')?.invalid && userForm.get('role')?.touched">
          Role is required
        </div>
      </div>


    </div>

   <div class="form-row">
      <div class="form-group full-width">
         <label class="inline-label">Active <span>*</span></label>
        <div class="inline-radio-group">
          <label class="radio-option">Yes <input type="radio" formControlName="isActive" [value]="true" /></label>
          <label class="radio-option">No <input type="radio" formControlName="isActive" [value]="false" /></label>
        </div>
      </div>
    </div>

    <!-- ✅ Place submit buttons inside the <form> -->
    <div class="dialog-actions">
     <div *ngIf="showMessage"
        class="custom-snack"
       [ngClass]="messageClass">
         {{ message }}
      </div>
      <button type="button" (click)="onCancel()">Cancel</button>
      <button type="submit" [disabled]="!userForm.valid">Save</button>
    </div>
  </form>
</div>
