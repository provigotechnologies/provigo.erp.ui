<form #holidayForm="ngForm" (ngSubmit)="addTable()" novalidate class="bank-form">

  <!-- Close Button -->
  <button type="button" class="close-btn">✖</button>

  <!-- Heading Section -->
  <div class="page-header-wrapper">
    <label class="page-heading">Add New Holiday</label>
  </div>

  <!-- Holiday Name Input -->
  <label for="holidayName">
    <span>Holiday Name <span class="required">*</span></span>
  </label>
  <input
    type="text"
    id="holidayName"
    name="holidayName"
    required
    minlength="3"
    pattern="^[a-zA-Z\s]+$"
    [(ngModel)]="holidayName"
    #holidayNameRef="ngModel"
    (input)="error = ''"
/>

  <!-- Validation Messages -->
  <div *ngIf="holidayNameRef.invalid && (holidayNameRef.touched || error)" class="error-message">
    <div *ngIf="holidayNameRef.errors?.['required']">Holiday name is required.</div>
    <div *ngIf="holidayNameRef.errors?.['minlength']">Must be at least 3 characters.</div>
    <div *ngIf="holidayNameRef.errors?.['pattern']">Only letters and spaces allowed.</div>
    <div *ngIf="error && !holidayNameRef.errors">{{ error }}</div>
  </div>

  <!-- Buttons -->
  <div class="button-group">
    <button
      class="primary-btn btn-add"
      type="button"
      [disabled]="holidayForm.invalid"
      (click)="addTable()"
    >Add</button>
    <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
  </div>

  <!-- Table Section -->
  <div class="table-wrapper">
    <table class="bank-table">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Holiday Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Show 3 empty rows if list is empty -->
        <ng-container *ngIf="holidayList.length === 0">
          <tr *ngFor="let row of [1,2,3]">
            <td>{{ row }}</td>
            <td style="color: gray;">-</td>
            <td>
              <button disabled>✏️</button>
              <button disabled>🗑️</button>
            </td>
          </tr>
        </ng-container>

        <!-- Show data rows -->
        <tr *ngFor="let name of holidayList; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ name }}</td>
          <td>
            <button type="button" (click)="editTable(i)">✏️</button>
            <button type="button" (click)="deleteTable(i)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</form>
