<form #locationForm="ngForm" (ngSubmit)="addTable()" novalidate class="bank-form">

  <!-- Page Heading -->
  <div class="page-header-wrapper">
    <label class="page-heading">Add New Location</label>
  </div>

  <!-- Location Name Input -->
  <label for="locationName">
    <span>Location Name <span class="required">*</span></span>
  </label>
  <input
    type="text"
    id="locationName"
    name="locationName"
    required
    minlength="3"
    pattern="^[a-zA-Z\s]+$"
    [(ngModel)]="locationName"
    #locationNameRef="ngModel"
    (input)="error = ''"
/>

  <!-- Validation Messages -->
  <div *ngIf="locationNameRef.invalid && (locationNameRef.touched || error)" class="error-message">
    <div *ngIf="locationNameRef.errors?.['required']">Location name is required.</div>
    <div *ngIf="locationNameRef.errors?.['minlength']">Must be at least 3 characters.</div>
    <div *ngIf="locationNameRef.errors?.['pattern']">Only letters and spaces allowed.</div>
    <div *ngIf="error && !locationNameRef.errors">{{ error }}</div>
  </div>

  <!-- Buttons -->
  <div class="button-group">
    <button
      class="primary-btn btn-add"
      type="button"
      [disabled]="locationForm.invalid"
      (click)="addTable()"
    >Add</button>
    <button class="primary-btn btn-cancel" type="button" (click)="cancel()">Cancel</button>
  </div>

  <!-- Table Section -->
  <div class="table-wrapper">
    <table class="bank-table">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Location Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>

        <!-- Show default 3 blank rows if list is empty -->
        <ng-container *ngIf="locationList.length === 0">
          <tr *ngFor="let row of [1,2,3]">
            <td>{{ row }}</td>
            <td style="color: gray;">-</td>
            <td>
              <button disabled>✏️</button>
              <button disabled>🗑️</button>
            </td>
          </tr>
        </ng-container>

        <!-- Show added locations -->
        <tr *ngFor="let name of locationList; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ name }}</td>
          <td>
            <button type="button" (click)="editTable(i)">✏️</button>
            <button type="button" (click)="deleteTable(i)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</form>
